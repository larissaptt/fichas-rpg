<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>DnD</title>
</head>
<body>
    <div class="perfil">
        <h1 class="nome_personagem">Heartman</h1>
        <div class="info_gerais">
            <p class="raca">Humano</p>
            <div class="hex">
                <img src="imagens/Daniel.jfif" alt="" class="foto_personagem_hex">
            </div>
            <div class="classes_niveis">
                <div class="classe">
                    <span>Escritor</span>
                    <span>3</span>
                </div>
                <div class="classe">
                    <span>Fighter</span>
                    <span>5</span>
                </div>
            </div>
        </div>
        <div class="barras">
            <div class="info.vida">
                <p>HP</p>
                <div class="barra_vida">
                    <div class="vida"><p>70/70</p></div>
                </div>
            </div>
            <div class="info.hp">
                <p>HD</p>
                <div class="barra_hp">
                    <div class="hp"><p>8d8</p></div>
                </div>
            </div>
        </div>
        <div class="statics">
            <div class="elemento">
                <div class="armadura">
                    <p>Armor Class</p>
                    <div class="fundo">
                        <p>17</p>
                    </div>
                </div>
            </div>
            <div class="elemento">
                <div class="iniciativa">
                    <p>iniciativa</p>
                    <div class="fundo">
                        <p>+5</p>
                    </div>
                </div>
            </div>
            <div class="elemento">
                <div class="movimento">
                    <p>Movimento</p>
                    <div class="fundo">
                        <p>9m</p>
                    </div>
                </div>
            </div>
            <div class="elemento">
                <div class="percepção">
                    <p>Per. passiva</p>
                    <div class="fundo">
                        <p>19</p>
                    </div>
                </div>
            </div>
            <div class="elemento">
                <div class="proeficiência">
                    <p>Proeficiência</p>
                    <div class="fundo">
                        <p>+4</p>
                    </div>
                </div>
            </div>
            <div class="elemento">
                <div class="inspiração">
                    <p>Inspiração</p>
                    <div class="fundo">
                        <p>5</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
